name: Run Knowledge Connector

on:
  workflow_dispatch:

jobs:
  run-connector:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

      - name: Run connector
        run: npm start
        env:
          CONFIGURER: customkb

          GENESYS_LOGIN_URL: https://login.mypurecloud.com
          GENESYS_BASE_URL: https://api.mypurecloud.com

          GENESYS_CLIENT_ID: ${{ secrets.CLIENT_ID }}
          GENESYS_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          GENESYS_KNOWLEDGE_BASE_ID: 3d5de442-ce9b-4cc1-b892-03836bb92d1f
